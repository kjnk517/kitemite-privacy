<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードのリセット - きてみて</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .app-name {
      color: #B8962E;
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      color: #1c1c1e;
      margin-bottom: 8px;
    }
    .desc {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      color: #3a3a3c;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 14px 48px 14px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      color: #1c1c1e;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #B8962E; }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #6e6e73;
      padding: 4px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: #B8962E;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button[type="submit"]:disabled { opacity: 0.5; cursor: default; }
    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message.error { background: #fff0f0; color: #c0392b; display: block; }
    .message.success { background: #f0fff4; color: #1a7a3c; display: block; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #B8962E;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">きてみて</div>
    <h1>新しいパスワードを設定</h1>
    <p class="desc">8文字以上のパスワードを入力してください。</p>

    <form id="resetForm">
      <label for="password">新しいパスワード</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="8文字以上" required />
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)">表示</button>
      </div>

      <label for="confirm">パスワード（確認）</label>
      <div class="input-wrap">
        <input type="password" id="confirm" placeholder="もう一度入力" required />
        <button type="button" class="toggle-pw" onclick="togglePw('confirm', this)">表示</button>
      </div>

      <button type="submit" id="submitBtn">パスワードを変更する</button>
    </form>

    <div id="message" class="message"></div>
    <a href="https://kjnk517.github.io/kitemite-privacy/" class="back-link" style="display:none" id="backLink">プライバシーポリシーに戻る</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://obwibfrgawyabtlfducx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_6nz7lnxnymU6AMi80L3sbw_8DioWZqx';
    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // URLフラグメントからトークンを取得してセッションを設定
    async function init() {
      const hash = window.location.hash.substring(1);
      const params = Object.fromEntries(new URLSearchParams(hash));
      if (params.access_token && params.refresh_token) {
        await client.auth.setSession({
          access_token: params.access_token,
          refresh_token: params.refresh_token,
        });
      } else if (params.error) {
        showMessage('リンクが無効または期限切れです。再度パスワードリセットを行ってください。', 'error');
        document.getElementById('resetForm').style.display = 'none';
      }
    }
    init();

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? '非表示' : '表示';
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password.length < 8) {
        showMessage('パスワードは8文字以上で入力してください。', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('パスワードが一致していません。', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '変更中...';

      const { error } = await client.auth.updateUser({ password });
      if (error) {
        showMessage('エラーが発生しました: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'パスワードを変更する';
      } else {
        showMessage('パスワードを変更しました。アプリからログインしてください。', 'success');
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('backLink').style.display = 'block';
      }
    });
  </script>
</body>
</html>
